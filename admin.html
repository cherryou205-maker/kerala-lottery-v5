<!DOCTYPE html>
<html>
<head>
<title>Admin Panel</title>

<style>

body{
font-family:Arial;
background:#111;
display:flex;
justify-content:center;
align-items:center;
height:100vh;
margin:0;
}

.box{
background:#222;
padding:20px;
border-radius:10px;
width:300px;
}

input{
width:100%;
padding:12px;
margin-top:10px;
border:none;
border-radius:5px;
box-sizing:border-box;
}

button{
width:100%;
padding:12px;
margin-top:10px;
background:green;
color:white;
border:none;
border-radius:5px;
font-size:16px;
}

h2{
color:white;
text-align:center;
}

</style>

</head>

<body>

<div class="box">

<h2>Admin Login</h2>

<input
type="password"
id="pass"
placeholder="Enter Password">

<button onclick="login()">
Login
</button>

<div id="panel" style="display:none;">

<input
type="text"
id="whatsapp"
placeholder="WhatsApp Number">

<button onclick="save()">
Save Number
</button>

</div>

</div>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";

import {
getDatabase,
ref,
set
} from "https://www.gstatic.com/firebasejs/10.12.2/firebase-database.js";

const firebaseConfig = {

apiKey: "AIzaSyBF2nsAiIatNPEpilH_7xHLGsbcabF8McA",

authDomain: "kerela-lotteryv5.firebaseapp.com",

databaseURL: "https://kerela-lotteryv5-default-rtdb.firebaseio.com",

projectId: "kerela-lotteryv5",

storageBucket: "kerela-lotteryv5.firebasestorage.app",

messagingSenderId: "368939540563",

appId: "1:368939540563:web:9ce89269081f68225466a6",

measurementId: "G-N531B3RQJB"

};

const app = initializeApp(firebaseConfig);

const db = getDatabase(app);

window.login = function(){

const pass =
document.getElementById("pass").value;

if(pass === "12345"){

document.getElementById("panel").style.display = "block";

}else{

alert("Wrong Password");

}

}

window.save = function(){

const whatsapp =
document.getElementById("whatsapp").value;

set(ref(db,"site"),{

whatsapp: whatsapp

});

alert("WhatsApp Updated");

}

</script>

</body>
</html>
